<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
    <!-- maximum-scale=1 + user-scalable=no stops iOS Safari from auto-zooming
         when an input is focused. viewport-fit=cover lets the app fill the
         notch/safe-area region. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#c8661a" />

    <!-- Installable PWA + iOS standalone "Add to Home Screen" -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "black" keeps app content clear of the notch/status bar across every
         screen (vs black-translucent which would draw under it and require a
         per-header inset). viewport-fit=cover still exposes safe-area insets
         for bottom-anchored UI (FABs, action bars). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="G-Dimension" />

    <title>G-Dimension — Your car build journal</title>
    <meta name="description" content="G-Dimension is the build journal for your car: log every mod, service, and milestone, and share a clean public profile of your build. Your build. Documented." />
    <link rel="canonical" href="https://gdimension.app/" />

    <!-- Open Graph / Twitter — default link preview for the marketing + auth
         pages. Per-build /builds pages get their own richer previews via an edge
         function (a separate task); this is the site-wide default. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="G-Dimension" />
    <meta property="og:title" content="G-Dimension — Your car build journal" />
    <meta property="og:description" content="Log every mod, service, and milestone — and share a clean public profile of your build." />
    <meta property="og:url" content="https://gdimension.app/" />
    <meta property="og:image" content="https://gdimension.app/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="G-Dimension — Your car build journal" />
    <meta name="twitter:description" content="Log every mod, service, and milestone — and share a clean public profile of your build." />
    <meta name="twitter:image" content="https://gdimension.app/og-default.png" />

    <!-- Stale-deploy safety net for the pre-boot case: if the main module
         script 404s (its hashed file was removed by a newer deploy while this
         tab was backgrounded), JS never runs, so the in-app guard can't fire.
         Catch the script load error here and reload once (capped) to fetch the
         fresh index.html + new chunk names. Shares the sessionStorage key with
         src/lib/chunkReload.ts so the two never double-reload. -->
    <script>
      (function () {
        window.addEventListener('error', function (e) {
          var t = e && e.target
          if (!t || t.tagName !== 'SCRIPT' || !/\/assets\/.*\.m?js$/.test(t.src || '')) return
          try {
            var k = 'gdim_chunk_reloads', n = +(sessionStorage.getItem(k) || 0)
            if (n < 2) { sessionStorage.setItem(k, n + 1); location.reload() }
          } catch (_) { location.reload() }
        }, true)
      })()
    </script>

    <!-- Google Fonts — Part 4 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Caveat:wght@400;500;600;700&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
