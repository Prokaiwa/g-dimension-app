<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon set — real multi-size assets in public/ (generated from the G
         badge). The old /src/assets/favicon.ico was a single 16x16 — blurry
         everywhere hi-DPI. icon-192 doubles as the hi-res tab icon source. -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <!-- maximum-scale=1 + user-scalable=no stops iOS Safari from auto-zooming
         when an input is focused. viewport-fit=cover lets the app fill the
         notch/safe-area region. interactive-widget=resizes-content fixes a
         separate Android Chrome bug: its historical default (resizes-visual)
         leaves window.innerHeight / 100dvh unchanged when the on-screen
         keyboard opens — only window.visualViewport shrinks — so every
         page here (laid out at height:'100dvh' with internal overflow-y
         scroll regions) has nothing to scroll against, and the keyboard
         just covers whatever's focused near the bottom (reported: the Trim
         field on Add Car, on a Pixel). resizes-content makes the browser
         actually shrink the viewport for the keyboard, so dvh containers
         resize and the browser's native scroll-focused-input-into-view
         behavior has something real to scroll. Safari ignores this
         property (no effect on iOS); does not affect the no-zoom setup
         above, which is a separate property. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#050507" />

    <!-- Installable PWA + iOS standalone "Add to Home Screen" -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "black" keeps app content clear of the notch/status bar across every
         screen (vs black-translucent which would draw under it and require a
         per-header inset). viewport-fit=cover still exposes safe-area insets
         for bottom-anchored UI (FABs, action bars). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="G-Dimension" />

    <title>G-Dimension — Your car build journal</title>
    <meta name="description" content="G-Dimension is the build journal for your car: log every mod, service, and milestone, and share a clean public profile of your build. Your build. Documented." />
    <link rel="canonical" href="https://gdimension.app/" />

    <!-- Open Graph / Twitter — default link preview for the marketing + auth
         pages. Per-build /builds pages get their own richer previews via an edge
         function (a separate task); this is the site-wide default. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="G-Dimension" />
    <meta property="og:title" content="G-Dimension — Your car build journal" />
    <meta property="og:description" content="Log every mod, service, and milestone — and share a clean public profile of your build." />
    <meta property="og:url" content="https://gdimension.app/" />
    <meta property="og:image" content="https://gdimension.app/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="G-Dimension — Your car build journal" />
    <meta name="twitter:description" content="Log every mod, service, and milestone — and share a clean public profile of your build." />
    <meta name="twitter:image" content="https://gdimension.app/og-default.png" />

    <!-- Structured data (JSON-LD is a data block, not executable script, so it is
         NOT covered by the CSP script-src hash allowlist — safe to edit without a
         vercel.json change). Defines the G-Dimension entity for the SPA-served
         routes (/signup, /login, legal). The marketing home (/) carries a richer
         set including FAQPage. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "G-Dimension",
      "url": "https://gdimension.app/",
      "applicationCategory": "AutomotiveApplication",
      "applicationSubCategory": "Car build journal & maintenance log",
      "operatingSystem": "Web browser, iOS, Android",
      "description": "G-Dimension is a digital build journal and maintenance logbook for car enthusiasts. Document every modification, part, service, receipt, and photo for each of your cars in one permanent, searchable record, and share a clean public build profile.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "G-Dimension", "url": "https://gdimension.app/" },
      "sameAs": [ "https://www.instagram.com/gdimensionapp/" ]
    }
    </script>

    <!-- Stale-deploy safety net for the pre-boot case: if the main module
         script 404s (its hashed file was removed by a newer deploy while this
         tab was backgrounded), JS never runs, so the in-app guard can't fire.
         Catch the script load error here and reload once (capped) to fetch the
         fresh index.html + new chunk names. Shares the sessionStorage key with
         src/lib/chunkReload.ts so the two never double-reload. -->
    <script>
      (function () {
        window.addEventListener('error', function (e) {
          var t = e && e.target
          if (!t || t.tagName !== 'SCRIPT' || !/\/assets\/.*\.m?js$/.test(t.src || '')) return
          try {
            var k = 'gdim_chunk_reloads', n = +(sessionStorage.getItem(k) || 0)
            if (n < 2) { sessionStorage.setItem(k, n + 1); location.reload() }
          } catch (_) { location.reload() }
        }, true)
      })()
    </script>

    <!-- Google Fonts — Part 4 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Caveat:wght@400;500;600;700&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
