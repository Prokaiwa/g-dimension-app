<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #1a1a1f; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 30px; font-family: sans-serif; color: #ccc; }
  .row { display: flex; gap: 30px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  label { font-size: 12px; opacity: 0.6; }
  canvas { border: 1px solid rgba(255,255,255,0.1); }
  #debug { font-size: 11px; color: #888; max-width: 800px; word-break: break-all; }
</style>
</head>
<body>

<div id="debug">Generating test images…</div>
<div class="row" id="stages"></div>

<script>
// ─── Create synthetic transparent-PNG car silhouettes ─────────────────────────
function makeSyntheticCar(W, H) {
  const c = document.createElement('canvas')
  c.width = W; c.height = H
  const ctx = c.getContext('2d')
  const frontTireX = 0.80 * W, frontTireY = 0.90 * H
  const rearTireX  = 0.20 * W, rearTireY  = 0.78 * H
  const frontR = 0.11 * H, rearR = 0.09 * H
  ctx.fillStyle = '#c0c0c0'
  ctx.beginPath()
  ctx.moveTo(0.06*W, rearTireY - rearR*0.15)
  ctx.lineTo(0.06*W, rearTireY - rearR*1.80)
  ctx.lineTo(0.30*W, rearTireY - rearR*2.80)
  ctx.lineTo(0.72*W, frontTireY - frontR*2.50)
  ctx.lineTo(0.96*W, frontTireY - frontR*1.50)
  ctx.lineTo(0.96*W, frontTireY - frontR*0.15)
  ctx.lineTo(frontTireX + frontR*1.15, frontTireY - frontR*0.15)
  ctx.lineTo(frontTireX + frontR*0.60, frontTireY + frontR*0.05)
  ctx.lineTo(frontTireX - frontR*0.60, frontTireY + frontR*0.05)
  ctx.lineTo(frontTireX - frontR*1.15, frontTireY - frontR*0.15)
  ctx.lineTo(rearTireX  + rearR*1.15,  rearTireY  - rearR*0.05)
  ctx.lineTo(rearTireX  + rearR*0.60,  rearTireY  + rearR*0.05)
  ctx.lineTo(rearTireX  - rearR*0.60,  rearTireY  + rearR*0.05)
  ctx.lineTo(rearTireX  - rearR*1.15,  rearTireY  - rearR*0.05)
  ctx.closePath(); ctx.fill()
  ctx.fillStyle = '#333'
  ctx.beginPath(); ctx.arc(frontTireX, frontTireY, frontR, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(rearTireX,  rearTireY,  rearR,  0, Math.PI*2); ctx.fill()
  ctx.fillStyle = '#888'
  ctx.beginPath(); ctx.arc(frontTireX, frontTireY, frontR*0.6, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(rearTireX,  rearTireY,  rearR*0.6,  0, Math.PI*2); ctx.fill()
  return c
}

// ─── CarStage: reliable reflection + shadow ───────────────────────────────────
//
// Approach: flat vertical flip anchored at the lowest opaque pixel (= tire contact).
// No perspective extrapolation — just the reliable geometry the image already encodes.
//
// Why not slope-based geometric reflection:
//   A true perspective reflection requires knowing the camera's focal length,
//   sensor height and horizontal field of view — which arbitrary user photos
//   do not carry. Per-pixel slope estimation extrapolates the ground line to
//   x=0, which is outside the image for steep 3/4-view shots, causing gy0 > dh
//   and placing shadows mid-car. All production car sites (Carvana, Spyne,
//   dealer marketplaces) use server-side AI or 3D rendering for this; in-browser
//   the flat flip is the reliable ceiling.
//
function analyzeAndRender(img, displayW) {
  const iw = img.naturalWidth || img.width
  const ih = img.naturalHeight || img.height

  // ── 1. Ground contact: lowest row with any opaque pixel ──────────────────
  //    The image is already background-removed and trimmed (1.5% padding),
  //    so the lowest opaque pixel is always the tire contact row.
  const off = document.createElement('canvas')
  off.width = iw; off.height = ih
  const octx = off.getContext('2d')
  octx.drawImage(img, 0, 0)
  const { data } = octx.getImageData(0, 0, iw, ih)

  let groundY = Math.round(ih * 0.985)  // safe default (trimmed image)
  outer: for (let y = ih - 1; y >= 0; y--) {
    for (let x = 0; x < iw; x++) {
      if (data[(y * iw + x) * 4 + 3] > 16) { groundY = y; break outer }
    }
  }

  document.getElementById('debug').textContent =
    `groundY=${groundY} (${(groundY/ih*100).toFixed(1)}% of ih) ih=${ih} iw=${iw}`

  // ── 2. Render ─────────────────────────────────────────────────────────────
  const sc   = displayW / iw
  const dh   = ih * sc
  const REFL = dh * 0.38
  const cssT = dh + REFL
  const dw   = displayW
  const gy   = groundY * sc   // ground contact y in display coords

  const canvas = document.createElement('canvas')
  canvas.width  = dw; canvas.height = cssT
  canvas.style.width  = dw + 'px'
  canvas.style.height = cssT + 'px'
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, dw, cssT)

  // Debug: show ground line
  ctx.save()
  ctx.strokeStyle = 'magenta'; ctx.lineWidth = 1; ctx.setLineDash([4, 4])
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(dw, gy); ctx.stroke()
  ctx.restore()

  // ── Reflection ─────────────────────────────────────────────────────────────
  // Simple vertical flip about gy. Always correct for any camera angle.
  const reflBuf = document.createElement('canvas')
  reflBuf.width = dw; reflBuf.height = Math.ceil(cssT)
  const rctx = reflBuf.getContext('2d')
  rctx.save()
  rctx.beginPath()
  rctx.rect(0, gy, dw, cssT - gy)   // clip to zone below tire contact
  rctx.clip()
  rctx.globalAlpha = 0.50
  rctx.transform(1, 0, 0, -1, 0, 2 * gy)  // flip vertically about gy
  rctx.drawImage(img, 0, 0, dw, dh)
  rctx.restore()
  const grad = rctx.createLinearGradient(0, gy, 0, gy + REFL)
  grad.addColorStop(0,    'rgba(0,0,0,0)')
  grad.addColorStop(0.22, 'rgba(0,0,0,0.28)')
  grad.addColorStop(0.58, 'rgba(0,0,0,0.80)')
  grad.addColorStop(0.92, 'rgba(0,0,0,1)')
  rctx.fillStyle = grad
  rctx.globalCompositeOperation = 'destination-out'
  rctx.fillRect(0, gy, dw, cssT - gy)
  ctx.drawImage(reflBuf, 0, 0)

  // ── Blackened silhouette for shadows ───────────────────────────────────────
  const blk = document.createElement('canvas')
  blk.width = dw; blk.height = dh
  const bctx = blk.getContext('2d')
  bctx.drawImage(img, 0, 0, dw, dh)
  bctx.globalCompositeOperation = 'source-in'
  bctx.fillStyle = '#000'; bctx.fillRect(0, 0, dw, dh)

  // ── Ambient shadow: vertical squash toward gy, no slope shear ─────────────
  // Anchoring to gy (not gy0) means the shadow is always attached to the tires,
  // not floating. No b-shear prevents shadow bleeding through transparent windows.
  ctx.save()
  ctx.filter = 'blur(20px)'; ctx.globalAlpha = 0.28
  const asy = 0.22
  ctx.transform(1.08, 0, 0, asy, -(0.04 * dw), gy - asy * dh)
  ctx.drawImage(blk, 0, 0, dw, dh)
  ctx.restore()

  // ── Contact shadow: thin strip right at gy ─────────────────────────────────
  ctx.save()
  ctx.filter = 'blur(4px)'; ctx.globalAlpha = 0.55
  const csy = 0.07
  ctx.transform(1.0, 0, 0, csy, 0, gy - csy * dh)
  ctx.drawImage(blk, 0, 0, dw, dh)
  ctx.restore()

  // ── Car ────────────────────────────────────────────────────────────────────
  ctx.drawImage(img, 0, 0, dw, dh)

  return { canvas, gy }
}

// ─── Main ─────────────────────────────────────────────────────────────────────
const DISPLAY_W = 340
const container = document.getElementById('stages')

// Test 1: 3/4 front-right
const synth1 = makeSyntheticCar(800, 500)
const r1 = analyzeAndRender(synth1, DISPLAY_W)
const col1 = document.createElement('div'); col1.className = 'col'
col1.innerHTML = '<label>3/4 front-right · gy=' + r1.gy.toFixed(0) + '</label>'
col1.appendChild(r1.canvas); container.appendChild(col1)

// Test 2: side-on (flat)
const synth2 = (function() {
  const W = 800, H = 500
  const c = document.createElement('canvas'); c.width = W; c.height = H
  const ctx = c.getContext('2d')
  ctx.fillStyle = '#c0c0c0'
  ctx.fillRect(0.08*W, 0.30*H, 0.84*W, 0.38*H)
  ctx.fillRect(0.20*W, 0.10*H, 0.50*W, 0.22*H)
  ctx.fillStyle = '#333'
  ctx.beginPath(); ctx.arc(0.75*W, 0.80*H, 0.12*H, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(0.25*W, 0.80*H, 0.12*H, 0, Math.PI*2); ctx.fill()
  return c
})()
const r2 = analyzeAndRender(synth2, DISPLAY_W)
const col2 = document.createElement('div'); col2.className = 'col'
col2.innerHTML = '<label>Side-on · gy=' + r2.gy.toFixed(0) + '</label>'
col2.appendChild(r2.canvas); container.appendChild(col2)

// Test 3: 3/4 front-left (steep negative perspective)
const synth3 = (function() {
  const W = 800, H = 500
  const c = document.createElement('canvas'); c.width = W; c.height = H
  const ctx = c.getContext('2d')
  const frontTireX = 0.20*W, frontTireY = 0.90*H
  const rearTireX  = 0.80*W, rearTireY  = 0.78*H
  const frontR = 0.11*H, rearR = 0.09*H
  ctx.fillStyle = '#c0c0c0'
  ctx.beginPath()
  ctx.moveTo(0.04*W, frontTireY - frontR*0.15)
  ctx.lineTo(0.04*W, frontTireY - frontR*1.50)
  ctx.lineTo(0.28*W, frontTireY - frontR*2.50)
  ctx.lineTo(0.70*W, rearTireY  - rearR*2.80)
  ctx.lineTo(0.94*W, rearTireY  - rearR*1.80)
  ctx.lineTo(0.94*W, rearTireY  - rearR*0.15)
  ctx.lineTo(rearTireX  + rearR*1.15, rearTireY  - rearR*0.05)
  ctx.lineTo(rearTireX  + rearR*0.60, rearTireY  + rearR*0.05)
  ctx.lineTo(rearTireX  - rearR*0.60, rearTireY  + rearR*0.05)
  ctx.lineTo(rearTireX  - rearR*1.15, rearTireY  - rearR*0.05)
  ctx.lineTo(frontTireX + frontR*1.15, frontTireY - frontR*0.15)
  ctx.lineTo(frontTireX + frontR*0.60, frontTireY + frontR*0.05)
  ctx.lineTo(frontTireX - frontR*0.60, frontTireY + frontR*0.05)
  ctx.lineTo(frontTireX - frontR*1.15, frontTireY - frontR*0.15)
  ctx.closePath(); ctx.fill()
  ctx.fillStyle = '#333'
  ctx.beginPath(); ctx.arc(frontTireX, frontTireY, frontR, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(rearTireX,  rearTireY,  rearR,  0, Math.PI*2); ctx.fill()
  ctx.fillStyle = '#888'
  ctx.beginPath(); ctx.arc(frontTireX, frontTireY, frontR*0.6, 0, Math.PI*2); ctx.fill()
  ctx.beginPath(); ctx.arc(rearTireX,  rearTireY,  rearR*0.6,  0, Math.PI*2); ctx.fill()
  return c
})()
const r3 = analyzeAndRender(synth3, DISPLAY_W)
const col3 = document.createElement('div'); col3.className = 'col'
col3.innerHTML = '<label>3/4 front-left · gy=' + r3.gy.toFixed(0) + '</label>'
col3.appendChild(r3.canvas); container.appendChild(col3)

document.getElementById('debug').textContent =
  'Done. Checks: (1) magenta line at tire bottoms, (2) reflection starts exactly there, (3) no shadow inside car body, (4) looks consistent across all three views.'
</script>
</body>
</html>
